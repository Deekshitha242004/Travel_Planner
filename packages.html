<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Travel Packages</title>

    <link rel="stylesheet" href="packages.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- HERO SECTION -->

    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">

            <h1>Explore Travel Packages</h1>

            <p>
                Discover handpicked journeys across India and the world
            </p>

        </div>

    </section>

    <!-- SEARCH SECTION -->

    <section class="search-section">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
            type="text"
            id="searchInput"
            placeholder="Search packages, countries, places...">

        </div>

    </section>

    <!-- PAGE HEADING -->

    <section class="heading-section">

        <h2>🌴 Explore Our Packages</h2>

        <p>
            Explore curated travel experiences designed for every traveler
        </p>

    </section>

    <!-- PACKAGE CARDS GENERATED BY JS -->

    <section
    class="package-container"
    id="packageContainer">

    </section>

    <!-- DETAILS MODAL -->

    <div
    class="modal"
    id="detailsModal">

        <div class="modal-content">

            <span
            class="close-btn"
            id="closeModal">

            &times;

            </span>

            <div id="modalBody">

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer>

        <h3>Travel Planner</h3>

        <p>
            Explore • Save • Plan • Travel
        </p>

        <p class="copyright">
            © 2026 Travel Planner. All Rights Reserved.
        </p>

    </footer>

    <script src="packages.js"></script>

</body>
</html>
